name: Build Release and Publish windows wheels

on:
  workflow_dispatch:
  schedule:
  # Runs at 11:00 AM UTC, which is 3:00 AM PST (UTC-8)
   - cron: '0 11 * * *'
  push:

# Ensure that only a single job or workflow using the same
# concurrency group will run at a time. This would cancel
# any in-progress jobs in the same github workflow and github
# ref (e.g. refs/heads/main or refs/pull/<pr_number>/merge).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_macos:
    name: MacOS Build
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    # Elevates permissions for `GITHUB_TOKEN`'s content scope (to allow this action to make a release)
    permissions:
      contents: write
    # Don't run this in everyone's forks on schedule but allow to run via dispatch.
    if: ${{ github.repository_owner == 'llvm' || github.event_name != 'schedule' }}
    strategy:
      matrix:
        package: [torch-mlir]
        py_version: [cp311-cp311]

    steps:
      - name: Checkout torch-mlir
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: sahas3/torch-mlir
          ref: refs/heads/tosa-linalg-pipeline-playground
          submodules: 'true'

      - name: Setup workspace
        uses: ./.github/actions/setup-build
        with:
          cache-enabled: 'true'
          torch-version: 'stable'

      - name: Checkout working branch
        run: |
          git fetch origin tosa-linalg-pipeline-playground
          git checkout tosa-linalg-pipeline-playground
          git submodule update --init --progress

      - name: Build torch-mlir
        run: |
          cd $GITHUB_WORKSPACE
          python -m pip install wheel
          TM_PACKAGE_VERSION=${{ github.event.inputs.python_package_version }}
          printf "TORCH_MLIR_PYTHON_PACKAGE_VERSION=%s\n" $TM_PACKAGE_VERSION > ./torch_mlir_package_version
          sudo ./build_tools/python_deploy/install_macos_deps.sh
          packages=${{ matrix.package }} TORCH_MLIR_PYTHON_VERSIONS="3.11" ./build_tools/python_deploy/build_macos_packages.sh

      - name: Make assets available in dist
        run: |
          mkdir dist
          cp build_tools/python_deploy/wheelhouse/torch*.whl dist/

      - name: Upload python wheels
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          if-no-files-found: error
          name: snapshot-${{ matrix.package }}-${{ matrix.py_version }}-${{ env.tm_package_version }}
          path: dist

      - name: Release python wheels
        uses: ncipollo/release-action@cdcc88a9acf3ca41c16c37bb7d21b9ad48560d87 # v.1.15.0
        with:
          artifacts: dist/*.whl
          token: "${{ secrets.GITHUB_TOKEN }}"
          tag: "dev-wheels"
          name: "dev-wheels"
          body: "Automatic snapshot release of torch-mlir python wheels."
          removeArtifacts: false
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true

